<!DOCTYPE html>
<html>
<head>
    <title>Pizarra Holyrics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
</head>
<body style="text-align: center; background: #1a1a1a; color: white; margin: 0;">
    <h3>Control Inalámbrico</h3>
    <div id="status">Conectando...</div>
    <canvas id="pizarra" width="500" height="400" style="background: white; touch-action: none; margin-top: 10px;"></canvas>

    <script>
        const canvas = document.getElementById('pizarra');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        // CONFIGURACIÓN SIMPLE
        const pusher = new Pusher('aecba9aee30c70c726a5', { cluster: 'us2' });
        // CANAL PÚBLICO (Sin el "private-")
        const channel = pusher.subscribe('pizarra-universal-pro');

        pusher.connection.bind('connected', () => {
            document.getElementById('status').innerText = "✅ EN LÍNEA";
        });

        const draw = (e) => {
            if (!drawing) return;
            let x, y;
            if (e.touches) {
                const rect = canvas.getBoundingClientRect();
                x = Math.round(e.touches[0].clientX - rect.left);
                y = Math.round(e.touches[0].clientY - rect.top);
            } else {
                x = e.offsetX; y = e.offsetY;
            }

            ctx.fillStyle = "black";
            ctx.fillRect(x, y, 4, 4);

            // USAMOS UN FETCH AL PROXY PARA ENVIAR (Ya que es canal público)
            fetch('https://pizarra-proxy.vercel.app/api/pusher', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    appId: "1972808", key: "aecba9aee30c70c726a5", 
                    secret: "7449bc982da41d37f194", cluster: "us2",
                    channel: "pizarra-universal-pro", event: "nuevo-trazo", data: {x, y}
                })
            });
        };

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', () => drawing = true);
        canvas.addEventListener('touchend', () => drawing = false);
        canvas.addEventListener('touchmove', draw);
    </script>
</body>
</html>
